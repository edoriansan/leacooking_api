version: "3.5"
services:
  postgres:
    container_name: postgres
    image: "postgres:14.7"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    hostname: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - postgres-dump:/postgresql.backup
      - postgres-archive:/var/lib/postgresql/archive
    ports:
      - "5432:5432"
    networks:
      - postgres
    restart: unless-stopped
  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-lea@leacooking.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-leacooking}
    volumes:
      - pgadmin-data:/root/.pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    networks:
      - postgres
    restart: unless-stopped
networks:
  postgres:
  esnet:
volumes:
  postgres-data:
  postgres-dump:
  postgres-archive:
  pgadmin-data:
  esdata1: